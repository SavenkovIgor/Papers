<!DOCTYPE html>
<html lang="en" data-theme="auto">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} — {{ site.title }}</title>
  {% seo %}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/article.css' | relative_url }}">
</head>
<body>
  <div class="reading-progress" id="reading-progress" aria-hidden="true"></div>

  <div class="page-layout">
    <nav class="toc-sidebar" id="toc-sidebar" aria-label="Table of contents">
      <p class="toc-label">Contents</p>
      <ul id="toc-list"></ul>
    </nav>

    <main class="article-wrap">
      <header class="article-header">
        <h1 class="article-title">{{ page.title }}</h1>
        {% if page.description %}
        <p class="article-description">{{ page.description }}</p>
        {% endif %}
      </header>

      <article class="article-body" id="article-body">
        {{ content }}
      </article>

      <footer class="article-footer">
        <p>
          Source on
          <a href="https://github.com/SavenkovIgor/Papers/blob/main/draft/ai_context_artifacts.md">GitHub</a>
        </p>
      </footer>
    </main>
  </div>

  <button class="back-to-top" id="back-to-top" aria-label="Back to top" title="Back to top">↑</button>

  <script src="{{ '/assets/js/article.js' | relative_url }}"></script>
</body>
</html>
